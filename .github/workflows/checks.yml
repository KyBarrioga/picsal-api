---
name: CI Checks

on: [push]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        if: ${{ secrets.DOCKERHUB_USER != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build app image
        run: docker compose -f docker-compose.yml build app
      - name: Start database
        run: docker compose -f docker-compose.yml up -d db
      - name: Test
        run: docker compose -f docker-compose.yml run --rm app sh -c "python manage.py wait_for_db && python manage.py test"
      - name: Lint
        run: docker compose -f docker-compose.yml run --rm --no-deps app sh -c "python -m flake8"
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml down -v
